<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cute Gift Ideas — SupaMegaCute</title>
  <meta name="description" content="Thoughtful cute gifts by recipient, occasion and budget — best friends, coworkers, kids and the person who has everything.">
  <link rel="icon" type="image/svg+xml" href="assets/brand/submarks/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="assets/smc.css">
</head>
<body data-page="pillar" data-pillar="gifts">

<header class="site-header" data-smc-header></header>

<main>
  <section class="pillar-hero">
    <div class="wrap">
      <img class="pillar-icon" src="assets/brand/icons/gift.svg" alt="">
      <span class="section-kicker">Gifts</span>
      <h1>Gifts that get a <span class="accent">gasp</span></h1>
      <p>Skip the gift-card panic. Browse by who it's for and the moment it's for — every pick is chosen to feel personal.</p>
    </div>
  </section>

  <section class="section" style="padding-top:0">
    <div class="wrap">
      <div class="section-head">
        <h2 class="section-title">Shop by person</h2>
      </div>
      <div class="chip-row" style="justify-content:center;margin-bottom:36px">
        <a class="chip" href="explore?pillars=gifts&recipients=for-her">For Her</a>
        <a class="chip" href="explore?pillars=gifts&recipients=for-him">For Him</a>
        <a class="chip" href="explore?pillars=gifts&recipients=best-friend">Best Friend</a>
        <a class="chip" href="explore?pillars=gifts&recipients=coworker">Coworker</a>
        <a class="chip" href="explore?pillars=gifts&recipients=kids">Kids</a>
        <a class="chip" href="explore?pillars=gifts&recipients=teens">Teens</a>
        <a class="chip" href="explore?pillars=gifts&recipients=self-treat">Treat Yourself</a>
        <a class="chip chip-gold" href="explore?pillars=gifts&priceBand=under-25">Under $25</a>
      </div>
      <div class="product-grid" data-smc-grid='{"pillars":["gifts"]}'></div>
    </div>
  </section>
</main>

<footer class="site-footer" data-smc-footer></footer>
<script src="js/graph.js" data-base="."></script>
</body>
</html>
